<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up - NextPath</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <link rel="stylesheet" href="signup.css">
</head>
<body class="bg-gradient-to-br from-blue-900 via-blue-800 to-purple-900 min-h-screen">
  <!-- Navigation -->
  <nav class="absolute top-0 w-full z-50 p-6">
    <div class="max-w-7xl mx-auto flex justify-between items-center">
      <div class="flex items-center">
        <i data-lucide="graduation-cap" class="h-8 w-8 text-white"></i>
        <span class="ml-2 text-xl font-bold text-white">NextPath</span>
      </div>
      <button onclick="window.location.href='../home/index.html'" class="text-white hover:text-blue-200 transition-colors">
        <i data-lucide="arrow-left" class="h-5 w-5 mr-2 inline"></i>
        Back to Home
      </button>
    </div>
  </nav>

  <!-- Background Animation -->
  <div class="absolute inset-0 opacity-10">
    <div class="absolute top-20 left-10 w-72 h-72 bg-blue-500 rounded-full mix-blend-multiply filter blur-xl animate-pulse"></div>
    <div class="absolute top-40 right-10 w-72 h-72 bg-purple-500 rounded-full mix-blend-multiply filter blur-xl animate-pulse delay-1000"></div>
    <div class="absolute -bottom-8 left-20 w-72 h-72 bg-pink-500 rounded-full mix-blend-multiply filter blur-xl animate-pulse delay-2000"></div>
  </div>

  <!-- Main Content -->
  <div class="relative min-h-screen flex items-center justify-center p-6">
    <div class="max-w-md w-full">
      <!-- Sign Up Card -->
      <div class="bg-white/95 backdrop-blur-md rounded-2xl shadow-2xl p-8 border border-white/20">
        <div class="text-center mb-8">
          <div class="w-16 h-16 bg-gradient-to-r from-blue-600 to-purple-600 rounded-full flex items-center justify-center mx-auto mb-4">
            <i data-lucide="user-plus" class="h-8 w-8 text-white"></i>
          </div>
          <h1 class="text-3xl font-bold text-gray-900 mb-2">Join NextPath</h1>
          <p class="text-gray-600">Connect with your alumni network and unlock opportunities</p>
        </div>

        <!-- User Type Selection -->
        <div class="mb-6">
          <label class="block text-sm font-medium text-gray-700 mb-3">I am a:</label>
          <div class="grid grid-cols-2 gap-3">
            <button id="student-type" class="user-type-btn active flex flex-col items-center p-4 border-2 border-blue-600 bg-blue-50 rounded-lg transition-all">
              <i data-lucide="graduation-cap" class="h-6 w-6 text-blue-600 mb-2"></i>
              <span class="text-sm font-medium text-blue-600">Student</span>
            </button>
            <button id="alumni-type" class="user-type-btn flex flex-col items-center p-4 border-2 border-gray-300 bg-white rounded-lg transition-all hover:border-purple-600 hover:bg-purple-50">
              <i data-lucide="briefcase" class="h-6 w-6 text-gray-600 mb-2"></i>
              <span class="text-sm font-medium text-gray-600">Alumni</span>
            </button>
          </div>
        </div>

        <!-- Sign Up Form -->
        <form id="signup-form" class="space-y-6">
          <!-- Personal Information -->
          <div class="grid grid-cols-2 gap-4">
            <div>
              <label class="block text-sm font-medium text-gray-700 mb-2">First Name</label>
              <input type="text" required class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all">
            </div>
            <div>
              <label class="block text-sm font-medium text-gray-700 mb-2">Last Name</label>
              <input type="text" required class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all">
            </div>
          </div>

          <div>
            <label class="block text-sm font-medium text-gray-700 mb-2">Email Address</label>
            <input type="email" required class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all">
          </div>

          <div>
            <label class="block text-sm font-medium text-gray-700 mb-2">Password</label>
            <div class="relative">
              <input type="password" id="password" required class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all pr-12">
              <button type="button" id="toggle-password" class="absolute right-3 top-1/2 transform -translate-y-1/2 text-gray-500 hover:text-gray-700">
                <i data-lucide="eye" class="h-5 w-5"></i>
              </button>
            </div>
          </div>

          <div>
            <label class="block text-sm font-medium text-gray-700 mb-2">Confirm Password</label>
            <input type="password" id="confirm-password" required class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all">
          </div>

          <!-- Educational Information -->
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-2">University/Institution</label>
            <select required class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all">
              <option value="">Select your institution</option>
              <option value="iit-bombay">IIT Bombay</option>
              <option value="iit-delhi">IIT Delhi</option>
              <option value="iit-madras">IIT Madras</option>
              <option value="iit-kanpur">IIT Kanpur</option>
              <option value="iit-kharagpur">IIT Kharagpur</option>
              <option value="nit-trichy">NIT Trichy</option>
              <option value="bits-pilani">BITS Pilani</option>
              <option value="vit-vellore">VIT Vellore</option>
              <option value="other">Other</option>
            </select>
          </div>

          <div class="grid grid-cols-2 gap-4">
            <div>
              <label class="block text-sm font-medium text-gray-700 mb-2">Department</label>
              <select required class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all">
                <option value="">Select department</option>
                <option value="computer-science">Computer Science</option>
                <option value="information-technology">Information Technology</option>
                <option value="electronics">Electronics & Communication</option>
                <option value="mechanical">Mechanical Engineering</option>
                <option value="civil">Civil Engineering</option>
                <option value="electrical">Electrical Engineering</option>
                <option value="other">Other</option>
              </select>
            </div>
            <div id="graduation-year-field">
              <label class="block text-sm font-medium text-gray-700 mb-2">
                <span id="year-label">Expected Graduation</span>
              </label>
              <select required class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all">
                <option value="">Select year</option>
                <option value="2024">2024</option>
                <option value="2025">2025</option>
                <option value="2026">2026</option>
                <option value="2027">2027</option>
                <option value="2028">2028</option>
                <option value="2023">2023</option>
                <option value="2022">2022</option>
                <option value="2021">2021</option>
                <option value="2020">2020</option>
                <option value="2019">2019</option>
                <option value="2018">2018</option>
                <option value="2017">2017</option>
                <option value="2016">2016</option>
                <option value="2015">2015</option>
                <option value="other">Other</option>
              </select>
            </div>
          </div>

          <!-- Alumni-specific fields -->
          <div id="alumni-fields" class="hidden space-y-4">
            <div>
              <label class="block text-sm font-medium text-gray-700 mb-2">Current Company</label>
              <input type="text" class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all">
            </div>
            <div>
              <label class="block text-sm font-medium text-gray-700 mb-2">Current Position</label>
              <input type="text" class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all">
            </div>
            <div>
              <label class="block text-sm font-medium text-gray-700 mb-2">Years of Experience</label>
              <select class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all">
                <option value="">Select experience</option>
                <option value="0-1">0-1 years</option>
                <option value="1-3">1-3 years</option>
                <option value="3-5">3-5 years</option>
                <option value="5-10">5-10 years</option>
                <option value="10+">10+ years</option>
              </select>
            </div>
          </div>

          <!-- Terms and Conditions -->
          <div class="flex items-start space-x-3">
            <input type="checkbox" id="terms" required class="mt-1 h-4 w-4 text-blue-600 border-gray-300 rounded focus:ring-blue-500">
            <label for="terms" class="text-sm text-gray-600">
              I agree to the <a href="#" class="text-blue-600 hover:text-blue-700 underline">Terms of Service</a> and 
              <a href="#" class="text-blue-600 hover:text-blue-700 underline">Privacy Policy</a>
            </label>
          </div>

          <!-- Submit Button -->
          <button type="submit" class="w-full bg-gradient-to-r from-blue-600 to-purple-600 text-white py-3 px-6 rounded-lg font-semibold hover:from-blue-700 hover:to-purple-700 transform hover:-translate-y-1 transition-all duration-300 shadow-lg">
            Create Account
          </button>
        </form>

        <!-- Sign In Link -->
        <div class="mt-6 text-center">
          <p class="text-gray-600">
            Already have an account? 
            <button class="text-blue-600 hover:text-blue-700 font-medium underline">Sign In</button>
          </p>
        </div>
      </div>

      <!-- Social Proof -->
      <div class="mt-8 text-center">
        <p class="text-white/80 text-sm mb-4">Trusted by students and alumni from</p>
        <div class="flex justify-center space-x-6 text-white/60">
          <span class="text-xs">IIT Bombay</span>
          <span class="text-xs">IIT Delhi</span>
          <span class="text-xs">NIT Trichy</span>
          <span class="text-xs">BITS Pilani</span>
        </div>
      </div>
    </div>
  </div>

  <script src="signup.js"></script>
</body>
</html>
