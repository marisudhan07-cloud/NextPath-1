<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NextGen DevOps - Login</title>
  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', Arial, sans-serif;
      background: linear-gradient(135deg, #001f4d, #66a6ff); /* Navy → Light Blue */
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .container {
      background: #fff;
      border-radius: 20px;
      display: flex;
      width: 850px;
      max-width: 95%;
      box-shadow: 0 8px 24px rgba(0,0,0,0.15);
      overflow: hidden;
    }

    .left {
      flex: 1;
      background: url("https://cdn-icons-png.flaticon.com/512/2721/2721275.png") center/60% no-repeat, #f0f4ff;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .right {
      flex: 1;
      background: #f9f9f9;
      padding: 50px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
    }

    .logo {
      font-size: 1.8rem;
      font-weight: bold;
      color: #2d4cf0;
      margin-bottom: 5px;
    }

    .login-title {
      font-size: 1.4rem;
      font-weight: bold;
      color: #222;
      margin-bottom: 30px;
    }

    .form-group {
      width: 100%;
      margin-bottom: 18px;
      position: relative;
    }

    .form-group input {
      width: 100%;
      padding: 12px 40px 12px 15px;
      border: none;
      border-radius: 8px;
      background: #f1f1f1;
      font-size: 1rem;
      outline: none;
    }

    .form-group i {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      color: #666;
    }

    .forgot {
      text-align: right;
      width: 100%;
      margin-bottom: 25px;
    }

    .forgot a {
      color: #2d4cf0;
      font-size: 0.9rem;
      text-decoration: none;
    }

    .btn {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 8px;
      background: linear-gradient(90deg, #001f4d, #66a6ff);
      color: #fff;
      font-size: 1rem;
      font-weight: bold;
      cursor: pointer;
      transition: 0.3s;
    }

    .btn:hover {
      opacity: 0.9;
      transform: scale(1.02);
    }

    @media(max-width: 768px) {
      .container {
        flex-direction: column;
      }
      .left {
        display: none;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- Left side with DevOps illustration -->
    <div class="left"></div>

    <!-- Right side with Login form -->
    <div class="right">
      <div class="logo">NextGen DevOps</div>
      <div class="login-title">Login</div>

      <form id="loginForm">
        <div class="form-group">
          <input type="email" id="email" placeholder="Email" required>
          <i>📧</i>
        </div>

        <div class="form-group">
          <input type="password" id="password" placeholder="Password" required>
          <i>🔒</i>
        </div>

        <div class="form-group">
          <input type="tel" id="mobile" placeholder="Mobile Number" required pattern="[0-9]{10}">
          <i>📱</i>
        </div>

        <div class="forgot">
          <a href="#">Forgot Password?</a>
        </div>

        <button onclick="window.location.href='login.html'" class="px-4 py-2 text-sm font-medium text-blue-600 bg-white rounded-lg hover:bg-blue-50 transition-colors">Login</button> 
      </form>
    </div>
  </div>

  <script>
    const form = document.getElementById("loginForm");
    form.addEventListener("submit", function(e) {
      e.preventDefault();

      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value.trim();
      const mobile = document.getElementById("mobile").value.trim();

      const mobilePattern = /^[0-9]{10}$/;
      const emailPattern = /^[^ ]+@[^ ]+\.[a-z]{2,3}$/;

      if (!email.match(emailPattern)) {
        alert("Please enter a valid email.");
        return;
      }
      if (password.length < 6) {
        alert("Password must be at least 6 characters.");
        return;
      }
      if (!mobile.match(mobilePattern)) {
        alert("Please enter a valid 10-digit mobile number.");
        return;
      }

      alert("✅ Login Successful!");
    });
  </script>
</body>
</html>
